<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      width: 240px;
      margin: 0;
      padding: 14px;
      color: #222;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: #be0000; display: inline-block; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    fieldset { border: 1px solid #ddd; border-radius: 6px; margin: 0; padding: 8px 10px; }
    legend { font-size: 12px; color: #666; padding: 0 4px; }
    label.mode { display: block; font-size: 13px; margin: 4px 0; cursor: pointer; }
    .switch-label { font-size: 13px; font-weight: 700; }
    input[type="checkbox"] { transform: scale(1.3); }
  </style>
</head>
<body>
  <h1><span class="dot"></span>日本メーカーフィルター</h1>

  <div class="row">
    <span class="switch-label">日本メーカー強調</span>
    <input type="checkbox" id="enabled">
  </div>

  <fieldset>
    <legend>表示方法</legend>
    <label class="mode"><input type="radio" name="mode" value="badge"> 薄く表示＋「日本メーカー」の印</label>
    <label class="mode"><input type="radio" name="mode" value="hide"> 日本メーカー以外を隠す</label>
  </fieldset>

  <script src="popup.js"></script>
</body>
</html>
